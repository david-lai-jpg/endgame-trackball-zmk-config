<?xml version="1.0" encoding="UTF-8"?>
<!--
  KEY POSITIONS — efogtech_trackball_0
  Physical layout: 8 radial buttons + 2 front-mounted encoders × 2 actions = 12 binding slots
  Button order: left-right pairs, top to bottom
  Encoder wiring: DECLARE_ENCODERS = <&rotenc_follower 10 8 &rotenc_follower 9 11>
    Left encoder:  CW → pos 10, CCW → pos 8
    Right encoder: CW → pos 9,  CCW → pos 11
-->
<svg width="820" height="740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg        { fill: #0a0a0a; }
      .chassis   { fill: #151515; stroke: #333; stroke-width: 1.5; }
      .btn       { fill: #2a2a2a; stroke: #00ff88; stroke-width: 2; }
      .enc-body  { fill: #1a1a1a; stroke: #ff9900; stroke-width: 2; }
      .enc-slot  { fill: #1e1e0a; stroke: #ffcc00; stroke-width: 1.5; }
      .trackball { fill: #cc2200; stroke: #ff4422; stroke-width: 2; }
      .tb-shine  { fill: rgba(255,255,255,0.12); }
      .num       { fill: #ff00ff; font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .num-enc   { fill: #ff9900; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .lbl       { fill: #999; font-family: 'Courier New', monospace; font-size: 10px; text-anchor: middle; dominant-baseline: central; }
      .title     { fill: #fff; font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .subtitle  { fill: #888; font-family: 'Courier New', monospace; font-size: 11px; text-anchor: middle; }
      .section   { fill: #ffff00; font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; }
      .legend    { fill: #ccc; font-family: 'Courier New', monospace; font-size: 11px; dominant-baseline: central; }
      .enc-lbl   { fill: #ff9900; font-family: 'Courier New', monospace; font-size: 11px; text-anchor: middle; font-weight: bold; }
      .dim       { stroke: #333; stroke-width: 1; stroke-dasharray: 4 3; }
      .tb-text   { fill: rgba(255,255,255,0.3); font-family: 'Courier New', monospace; font-size: 11px; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect width="820" height="740" class="bg"/>

  <!-- Title -->
  <text x="410" y="30" class="title">EFOGTECH TRACKBALL 0 — KEY POSITIONS</text>
  <text x="410" y="48" class="subtitle">8 buttons (L-R pairs, top→bottom) + 2 encoders × 2 dirs = 12 binding slots</text>

  <!-- ───── DEVICE DIAGRAM ───── -->
  <!-- Chassis: rounded square, centered at (410, 280) -->
  <rect x="110" y="70" width="600" height="420" rx="40" class="chassis"/>

  <!-- Trackball at center -->
  <circle cx="410" cy="280" r="85" class="trackball"/>
  <ellipse cx="388" cy="254" rx="26" ry="16" class="tb-shine"/>
  <text x="410" y="280" class="tb-text">TRACKBALL</text>

  <!-- ── BUTTONS (left-right pairs, top to bottom) ── -->

  <!-- Row 1: Top — pos 0 (TL outer), pos 1 (TR outer) -->
  <rect x="212" y="82" width="120" height="58" rx="10" class="btn"/>
  <text x="272" y="104" class="num">0</text>
  <text x="272" y="124" class="lbl">TL outer</text>

  <rect x="488" y="82" width="120" height="58" rx="10" class="btn"/>
  <text x="548" y="104" class="num">1</text>
  <text x="548" y="124" class="lbl">TR outer</text>

  <!-- Row 2: Mid-outer — pos 2 (ML outer), pos 3 (MR outer) -->
  <rect x="118" y="168" width="80" height="100" rx="10" class="btn"/>
  <text x="158" y="208" class="num">2</text>
  <text x="158" y="228" class="lbl">ML outer</text>

  <rect x="622" y="168" width="80" height="100" rx="10" class="btn"/>
  <text x="662" y="208" class="num">3</text>
  <text x="662" y="228" class="lbl">MR outer</text>

  <!-- Row 3: Mid-inner — pos 4 (ML inner), pos 5 (MR inner) -->
  <rect x="118" y="298" width="80" height="100" rx="10" class="btn"/>
  <text x="158" y="338" class="num">4</text>
  <text x="158" y="358" class="lbl">ML inner</text>

  <rect x="622" y="298" width="80" height="100" rx="10" class="btn"/>
  <text x="662" y="338" class="num">5</text>
  <text x="662" y="358" class="lbl">MR inner</text>

  <!-- Row 4: Bottom — pos 6 (BL inner), pos 7 (BR inner) -->
  <rect x="212" y="418" width="120" height="58" rx="10" class="btn"/>
  <text x="272" y="440" class="num">6</text>
  <text x="272" y="458" class="lbl">BL inner</text>

  <rect x="488" y="418" width="120" height="58" rx="10" class="btn"/>
  <text x="548" y="440" class="num">7</text>
  <text x="548" y="458" class="lbl">BR inner</text>

  <!-- ── ENCODERS (front-mounted, bottom edge) ── -->

  <!-- Left encoder wheel -->
  <ellipse cx="220" cy="495" rx="44" ry="10" class="enc-body"/>
  <text x="220" y="495" class="enc-lbl">LEFT ENC</text>

  <!-- Right encoder wheel -->
  <ellipse cx="600" cy="495" rx="44" ry="10" class="enc-body"/>
  <text x="600" y="495" class="enc-lbl">RIGHT ENC</text>

  <!-- Left encoder action slots -->
  <!-- pos 8 = Left CCW (scroll left) -->
  <rect x="150" y="518" width="64" height="36" class="enc-slot" rx="6"/>
  <text x="182" y="530" class="num-enc">8</text>
  <text x="182" y="544" class="lbl">← CCW</text>

  <!-- pos 10 = Left CW (scroll right) -->
  <rect x="226" y="518" width="64" height="36" class="enc-slot" rx="6"/>
  <text x="258" y="530" class="num-enc">10</text>
  <text x="258" y="544" class="lbl">CW →</text>

  <!-- Right encoder action slots -->
  <!-- pos 11 = Right CCW (scroll left) -->
  <rect x="528" y="518" width="64" height="36" class="enc-slot" rx="6"/>
  <text x="560" y="530" class="num-enc">11</text>
  <text x="560" y="544" class="lbl">← CCW</text>

  <!-- pos 9 = Right CW (scroll right) -->
  <rect x="604" y="518" width="64" height="36" class="enc-slot" rx="6"/>
  <text x="636" y="530" class="num-enc">9</text>
  <text x="636" y="544" class="lbl">CW →</text>

  <!-- Connector lines -->
  <line x1="200" y1="505" x2="182" y2="518" class="dim"/>
  <line x1="240" y1="505" x2="258" y2="518" class="dim"/>
  <line x1="580" y1="505" x2="560" y2="518" class="dim"/>
  <line x1="620" y1="505" x2="636" y2="518" class="dim"/>

  <!-- ───── REFERENCE TABLE ───── -->
  <rect x="30" y="580" width="760" height="148" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1" rx="6"/>
  <text x="46" y="598" class="section">BINDING SLOT REFERENCE (per layer, default bindings shown)</text>

  <text x="46" y="618" class="legend">pos 0  TL outer   (ltmkp SNIPE ENTER)       pos 1  TR outer   (ltmkp SCROLL ESC)</text>
  <text x="46" y="636" class="legend">pos 2  ML outer   (mkp MCLK)                pos 3  MR outer   (cdch SCROLL → copy/paste)</text>
  <text x="46" y="654" class="legend">pos 4  ML inner   (mkp LCLK)                pos 5  MR inner   (mkp RCLK)</text>
  <text x="46" y="672" class="legend">pos 6  BL inner   (ltm EXTRAS MB4)          pos 7  BR inner   (ltm DEVICE MB5)</text>

  <text x="46" y="696" class="legend" style="fill:#ff9900;">LEFT ENCODER (gpio0.15)                   RIGHT ENCODER (gpio0.11)</text>
  <text x="46" y="714" class="legend">pos 8  L CCW ← (C_VOL_UP)   pos 10 L CW → (C_VOL_DN)    pos 11 R CCW ← (prev tab)   pos 9  R CW → (next tab)</text>
</svg>
