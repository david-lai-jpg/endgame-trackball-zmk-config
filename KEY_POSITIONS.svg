<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0a0a0a; }
      .btn { fill: #2d2d2d; stroke: #00ff00; stroke-width: 2; }
      .enc-wheel { fill: #1a1a1a; stroke: #ff9900; stroke-width: 2; }
      .enc-action { fill: #1e1e0a; stroke: #ffcc00; stroke-width: 1.5; }
      .num-btn { fill: #ff00ff; font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .num-enc { fill: #ff9900; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #aaaaaa; font-family: 'Courier New', monospace; font-size: 11px; text-anchor: middle; dominant-baseline: central; }
      .title { fill: #ffffff; font-family: 'Courier New', monospace; font-size: 24px; font-weight: bold; text-anchor: middle; }
      .subtitle { fill: #888888; font-family: 'Courier New', monospace; font-size: 12px; text-anchor: middle; }
      .section { fill: #ffff00; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
      .legend-text { fill: #cccccc; font-family: 'Courier New', monospace; font-size: 12px; dominant-baseline: central; }
      .arrow { fill: #ffcc00; font-family: 'Courier New', monospace; font-size: 20px; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect width="900" height="620" class="bg"/>

  <text x="450" y="32" class="title">EFOGTECH TRACKBALL 0 — KEY POSITIONS</text>
  <text x="450" y="52" class="subtitle">8 Buttons (0-7) + 2 Encoders × 2 Actions (8-11) = 12 binding slots per layer</text>

  <text x="60" y="82" class="section">BUTTONS (Left column → Right column, Top → Bottom)</text>

  <rect x="100" y="100" width="68" height="60" class="btn" rx="8"/>
  <text x="134" y="124" class="num-btn">0</text>
  <text x="134" y="146" class="label">ltmkp Snipe</text>

  <rect x="240" y="100" width="68" height="60" class="btn" rx="8"/>
  <text x="274" y="124" class="num-btn">1</text>
  <text x="274" y="146" class="label">ltmkp Scroll</text>

  <rect x="100" y="178" width="68" height="60" class="btn" rx="8"/>
  <text x="134" y="202" class="num-btn">2</text>
  <text x="134" y="224" class="label">MCLK</text>

  <rect x="240" y="178" width="68" height="60" class="btn" rx="8"/>
  <text x="274" y="202" class="num-btn">3</text>
  <text x="274" y="224" class="label">cdch Scroll</text>

  <rect x="100" y="256" width="68" height="60" class="btn" rx="8"/>
  <text x="134" y="280" class="num-btn">4</text>
  <text x="134" y="302" class="label">LCLK</text>

  <rect x="240" y="256" width="68" height="60" class="btn" rx="8"/>
  <text x="274" y="280" class="num-btn">5</text>
  <text x="274" y="302" class="label">RCLK</text>

  <rect x="100" y="334" width="68" height="60" class="btn" rx="8"/>
  <text x="134" y="358" class="num-btn">6</text>
  <text x="134" y="380" class="label">ltm Extras</text>

  <rect x="240" y="334" width="68" height="60" class="btn" rx="8"/>
  <text x="274" y="358" class="num-btn">7</text>
  <text x="274" y="380" class="label">ltm Device</text>

  <text x="460" y="82" class="section">ENCODERS</text>

  <text x="510" y="108" class="section" style="font-size:12px; fill:#ff9900;">ENCODER LEFT (GPIO 0.15)</text>
  <circle cx="530" cy="185" r="55" class="enc-wheel"/>
  <text x="530" y="176" class="num-enc" style="fill:#ffcc00;">ENC 0</text>

  <rect x="460" y="260" width="80" height="44" class="enc-action" rx="6"/>
  <text x="500" y="276" class="num-enc">8</text>
  <text x="500" y="294" class="label">CW ↻</text>

  <rect x="550" y="260" width="80" height="44" class="enc-action" rx="6"/>
  <text x="590" y="276" class="num-enc">9</text>
  <text x="590" y="294" class="label">CCW ↺</text>

  <text x="700" y="108" class="section" style="font-size:12px; fill:#ff9900;">ENCODER RIGHT (GPIO 0.11)</text>
  <circle cx="720" cy="185" r="55" class="enc-wheel"/>
  <text x="720" y="176" class="num-enc" style="fill:#ffcc00;">ENC 1</text>

  <rect x="650" y="260" width="80" height="44" class="enc-action" rx="6"/>
  <text x="690" y="276" class="num-enc">10</text>
  <text x="690" y="294" class="label">CW ↻</text>

  <rect x="740" y="260" width="80" height="44" class="enc-action" rx="6"/>
  <text x="780" y="276" class="num-enc">11</text>
  <text x="780" y="294" class="label">CCW ↺</text>

  <text x="60" y="440" class="section">BINDING ORDER IN .keymap (per layer)</text>

  <text x="60" y="465" class="legend-text">// buttons</text>
  <text x="60" y="483" class="legend-text">pos 0 (ltmkp Snipe ENTER)    pos 1 (ltmkp Scroll ESC)</text>
  <text x="60" y="501" class="legend-text">pos 2 (MCLK)                 pos 3 (cdch Scroll 0)</text>
  <text x="60" y="519" class="legend-text">pos 4 (LCLK)                 pos 5 (RCLK)</text>
  <text x="60" y="537" class="legend-text">pos 6 (ltm Extras MB4)       pos 7 (ltm Device MB5)</text>
  <text x="60" y="555" class="legend-text">// rotary encoders</text>
  <text x="60" y="573" class="legend-text">pos 8 (ENC0 CW)              pos 9 (ENC0 CCW)</text>
  <text x="60" y="591" class="legend-text">pos 10 (ENC1 CW)             pos 11 (ENC1 CCW)</text>

  <rect x="60" y="452" width="830" height="148" fill="none" stroke="#333333" stroke-width="1" rx="4"/>

  <rect x="55" y="157" width="3" height="240" fill="#444444"/>
  <text x="60" y="163" class="legend-text" style="fill:#666666; font-size:10px;">col 0</text>
  <rect x="235" y="157" width="3" height="240" fill="#444444"/>
  <text x="240" y="163" class="legend-text" style="fill:#666666; font-size:10px;">col 1</text>
</svg>
